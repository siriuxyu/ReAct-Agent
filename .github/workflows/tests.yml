name: tests

on:
  push:
    branches: [main]
  pull_request:

jobs:
  unit:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.10"
          cache: "pip"
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r requirements.txt
      - name: Test runtime control plane
        run: |
          pytest -q \
            tests/test_agent_loop.py \
            tests/test_runtime_workspace.py \
            tests/test_runtime_performance.py \
            tests/test_tool_policy.py \
            tests/test_tool_registry.py \
            tests/test_model_router_strategy.py \
            tests/test_tool_execution_runtime.py \
            tests/test_runtime_service.py \
            tests/test_api_adapter.py \
            tests/test_langgraph_nodes.py
